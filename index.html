<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bero's Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating Particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Main Card -->
  <main class="glass-card">
    <h1 class="typing-title">Bero's Website</h1>
    <p class="subtitle glitch" data-text="Coded on iPhone. Add me on Snap!">Coded on iPhone. Add me on Snap!</p>

    <!-- Snapchat Button -->
    <div class="snap-section">
      <button class="snapchat-btn" onclick="openSnap()">
        <span class="snap-icon">👻</span>
        Add Bero!
      </button>
    </div>

    <!-- Stats (funktionieren!) -->
    <div class="stats">
      <div class="stat-item">
        <span class="stat-number" id="visits">0</span>
        <span>Visitors</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="snaps">0</span>
        <span>Snap Adds</span>
      </div>
    </div>

    <!-- Social Links -->
    <div class="social-links">
      <a href="#" class="social-btn discord">💜 Discord</a>
      <a href="#" class="social-btn tiktok">🕺 TikTok</a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

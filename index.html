<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 380px;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
    }

    /* TikTok Follower Section */
    .follower-stats {
      margin-top: 25px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 25px;
      border: 1px solid rgba(255, 0, 80, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* This iframe pulls the live count for your specific username */
    .count-frame {
      border: none;
      width: 100%;
      height: 80px;
      overflow: hidden;
      filter: invert(1) hue-rotate(180deg) brightness(1.5); /* Makes it match our dark theme */
    }

    .follower-stats p {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--pink);
      font-weight: 900;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    /* Buttons */
    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      z-index: 20;
    }
    .tiktok-btn { left: 20px; background: #000; color: white; box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent); }
    .snap-btn { right: 20px; background: var(--snap); color: black; }

    /* Music Control */
    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 45px; height: 45px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
    }

    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 10px; opacity: 0.5;" id="songTitle">CHILL JAZZ</div>
    <audio id="audioPlayer" loop></audio>
  </div>

  <main class="card">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 4px; margin-bottom: 10px;">BERO OFFICIAL</p>
    <h1 id="heroName" onclick="handleEgg()">BERO</h1>
    
    <div class="follower-stats">
      <p><i class="fa-brands fa-tiktok"></i> Live Followers</p>
      <!-- Using a specialized counter widget for @a7la_bero69 -->
      <iframe src="https://www.countonsocial.com/api/tiktok-follower-count/a7la_bero69/minimal" class="count-frame"></iframe>
    </div>
  </main>

  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    // 1. RANDOM JAZZ
    const jazzSongs = [
      { name: "CHILL LO-FI", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { name: "NIGHT JAZZ", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { name: "SMOOTH SAX", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" }
    ];
    const player = document.getElementById('audioPlayer');
    const song = jazzSongs[Math.floor(Math.random() * jazzSongs.length)];
    player.src = song.url;
    document.getElementById('songTitle').innerText = song.name;

    function togglePlay() {
      const btn = document.getElementById('playBtn');
      if (player.paused) {
        player.play();
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--accent)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
      }
    }

    // 2. HIGH MODE (5 Taps)
    let taps = 0;
    function handleEgg() {
      taps++;
      if(taps === 5) {
        document.getElementById('mainBody').classList.add('high-mode');
        document.getElementById('heroName').innerText = "HIGH MODE";
        taps = 0;
      }
      setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>

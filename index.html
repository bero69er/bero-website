<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 380px;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
      margin-bottom: 10px;
    }

    /* Professional Fight Box */
    .fight-box {
      margin-top: 15px;
      width: 100%;
      height: 180px;
      background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
      border-radius: 30px;
      border: 3px solid #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .snow {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(circle, #fff 1.5px, transparent 2px);
      background-size: 50px 50px;
      animation: snowFall 3s linear infinite;
      opacity: 0.8;
    }

    @keyframes snowFall {
      0% { background-position: 0px 0px; }
      100% { background-position: 0px 100px; }
    }

    .stage {
      position: absolute;
      bottom: 10px;
      width: 100%;
      height: 100px;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
    }

    .fighter { width: 60px; height: 90px; position: relative; }
    .fighter svg { width: 100%; height: 100%; stroke: #1a1a1a; stroke-width: 3; fill: none; stroke-linecap: round; }

    .sword { 
      stroke: #718093 !important; 
      stroke-width: 2.5 !important;
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.8));
    }

    .f1 { animation: fightLeft 2.5s ease-in-out infinite; }
    .f2 { animation: fightRight 2.5s ease-in-out infinite; transform: scaleX(-1); }

    @keyframes fightLeft {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      20% { transform: translateX(30px) rotate(5deg); } 
      25% { transform: translateX(25px) rotate(-10deg); } 
      50% { transform: translateX(5px) rotate(0deg); } 
      70% { transform: translateX(35px) rotate(-20deg); } 
      75% { transform: translateX(30px) rotate(10deg); } 
    }

    @keyframes fightRight {
      0%, 100% { transform: scaleX(-1) translateX(0); }
      20% { transform: scaleX(-1) translateX(30px) rotate(5deg); }
      25% { transform: scaleX(-1) translateX(25px) rotate(-10deg); }
      50% { transform: scaleX(-1) translateX(5px) rotate(0deg); }
      70% { transform: scaleX(-1) translateX(35px) rotate(-20deg); }
      75% { transform: scaleX(-1) translateX(30px) rotate(10deg); }
    }

    .spark {
      position: absolute;
      top: 40%; left: 50%;
      width: 15px; height: 15px;
      background: #FFFC00;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      opacity: 0;
      z-index: 5;
      animation: sparkFlash 2.5s infinite;
    }

    @keyframes sparkFlash {
      24%, 74% { opacity: 0; transform: scale(0.5); }
      25%, 75% { opacity: 1; transform: scale(1.2); }
      27%, 77% { opacity: 0; transform: scale(1.5); }
    }

    /* Buttons */
    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      z-index: 20;
    }
    .tiktok-btn { left: 20px; background: #000; color: white; box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent); }
    .snap-btn { right: 20px; background: var(--snap); color: black; }

    /* Music Control */
    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 45px; height: 45px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
    }

    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 10px; opacity: 0.5;" id="songTitle">CHILL JAZZ</div>
    <audio id="audioPlayer" loop></audio>
  </div>

  <main class="card">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 4px; margin-bottom: 10px;">BERO OFFICIAL</p>
    <h1 id="heroName" onclick="handleEgg()">BERO</h1>
    
    <div class="fight-box">
      <div class="snow"></div>
      <div class="spark"></div>
      <div class="stage">
        <div class="fighter f1">
          <svg viewBox="0 0 40 100">
            <circle cx="20" cy="15" r="7"/>
            <path d="M20 22 L20 50"/>
            <path d="M20 30 L10 45"/>
            <path d="M20 30 L35 30"/>
            <path d="M35 10 L35 45" class="sword"/>
            <path d="M20 50 L10 80"/>
            <path d="M20 50 L30 80"/>
          </svg>
        </div>

        <div class="fighter f2">
          <svg viewBox="0 0 40 100">
            <circle cx="20" cy="15" r="7"/>
            <path d="M20 22 L20 50"/>
            <path d="M20 30 L10 45"/>
            <path d="M20 30 L35 30"/>
            <path d="M35 10 L35 45" class="sword"/>
            <path d="M20 50 L10 80"/>
            <path d="M20 50 L30 80"/>
          </svg>
        </div>
      </div>
    </div>
  </main>

  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    // 1. RANDOM JAZZ
    const jazzSongs = [
      { name: "CHILL LO-FI", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { name: "NIGHT JAZZ", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { name: "SMOOTH SAX", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" }
    ];
    const player = document.getElementById('audioPlayer');
    const song = jazzSongs[Math.floor(Math.random() * jazzSongs.length)];
    player.src = song.url;
    document.getElementById('songTitle').innerText = song.name;

    function togglePlay() {
      const btn = document.getElementById('playBtn');
      if (player.paused) {
        player.play();
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--accent)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
      }
    }

    // 2. HIGH MODE (5 Taps)
    let taps = 0;
    function handleEgg() {
      taps++;
      if(taps === 5) {
        document.getElementById('mainBody').classList.add('high-mode');
        document.getElementById('heroName').innerText = "HIGH MODE";
        taps = 0;
      }
      setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>

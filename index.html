<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 380px;
      padding: 50px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
    }

    .visitor-stats {
      margin-top: 20px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      padding: 12px 25px;
      border-radius: 20px;
      border: 1px solid rgba(0, 242, 234, 0.3);
    }

    .visitor-stats span { 
      font-weight: 900; 
      color: var(--accent); 
      font-size: 1.8rem;
      text-shadow: 0 0 15px rgba(0, 242, 234, 0.6);
    }

    .visitor-stats p { font-size: 9px; letter-spacing: 2px; opacity: 0.5; margin-top: 5px; }

    /* Buttons */
    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      z-index: 20;
    }
    .tiktok-btn { left: 20px; background: #000; color: white; box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent); }
    .snap-btn { right: 20px; background: var(--snap); color: black; }

    /* Music */
    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 45px; height: 45px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
    }

    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 10px; opacity: 0.5;" id="songTitle">JAZZ LOADING...</div>
    <audio id="audioPlayer" loop></audio>
  </div>

  <main class="card">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 4px; margin-bottom: 10px;">BERO NETWORK</p>
    <h1 id="heroName" onclick="handleEgg()">BERO</h1>
    <p id="status-text" style="color:#888; font-size: 0.9rem; margin-top: 5px;">Syncing Global Stats...</p>
    
    <div class="visitor-stats">
      <span id="vCount">0</span>
      <p>LIVE WORLDWIDE VISITS</p>
    </div>
  </main>

  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    // 1. UPDATED LIVE GLOBAL COUNTER (CounterAPI.dev)
    async function updateCounter() {
      const namespace = "bero_official_2026"; 
      const key = "hits";
      const countDisplay = document.getElementById('vCount');

      try {
        // We use 'up' to increment and get the new value
        const response = await fetch(`https://counterapi.dev/api/${namespace}/${key}/up`);
        const result = await response.json();
        if(result.status === "success") {
          countDisplay.innerText = result.data.toLocaleString();
          document.getElementById('status-text').innerText = "Live Network Connected";
        }
      } catch (e) {
        countDisplay.innerText = "1"; // Local fallback
      }
    }
    updateCounter();

    // 2. RANDOM JAZZ
    const jazzSongs = [
      { name: "CHILL LO-FI", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { name: "NIGHT JAZZ", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { name: "SMOOTH SAX", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" }
    ];
    const player = document.getElementById('audioPlayer');
    const song = jazzSongs[Math.floor(Math.random() * jazzSongs.length)];
    player.src = song.url;
    document.getElementById('songTitle').innerText = song.name;

    function togglePlay() {
      const btn = document.getElementById('playBtn');
      if (player.paused) {
        player.play();
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--accent)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
      }
    }

    // 3. HIGH MODE
    let taps = 0;
    function handleEgg() {
      taps++;
      if(taps === 5) {
        document.getElementById('mainBody').classList.add('high-mode');
        document.getElementById('status-text').innerText = "HIGH MODE ACTIVATED";
        document.getElementById('status-text').style.color = "var(--accent)";
        taps = 0;
      }
      setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>

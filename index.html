<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 5; /* Lower than buttons */
      width: 85%;
      max-width: 360px;
      padding: 25px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
      margin-bottom: 5px;
    }

    .storm-scene {
      margin: 10px auto 0;
      width: 75%;
      height: 130px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .scene-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
      filter: brightness(0.8) contrast(1.2);
      animation: lightningFlash 8s linear infinite;
    }

    .rain-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .rain-overlay::after {
      content: "";
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 200%;
      background-image: repeating-linear-gradient(170deg, 
        transparent 0%, 
        transparent 10%, 
        rgba(255, 255, 255, 0.1) 10%, 
        rgba(255, 255, 255, 0.1) 11%, 
        transparent 11%);
      background-size: 100% 40px;
      animation: rainFall 0.4s linear infinite;
    }

    @keyframes rainFall {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }

    @keyframes lightningFlash {
      0%, 45%, 55%, 100% { filter: brightness(0.8) contrast(1.2); }
      48% { filter: brightness(2.5) contrast(1.5); }
      50% { filter: brightness(1) contrast(1.2); }
      52% { filter: brightness(2) contrast(1.4); }
    }

    /* Standard Button Positioning */
    .btn {
      position: fixed;
      bottom: 30px; /* Kept low for normal mode */
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
      z-index: 20;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .tiktok-btn { left: 15px; background: #000; color: white; box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent); }
    .snap-btn { right: 15px; background: var(--snap); color: black; }

    /* HIGH MODE - Move buttons safely away from the card */
    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }

    .high-mode .btn {
      bottom: 60px; /* Moves them up enough to clear the card on small screens */
    }

    /* Fix for very short screens (Samsung Fold / Small Androids) */
    @media (max-height: 700px) {
      .btn { bottom: 15px; padding: 10px 16px; font-size: 12px; }
      .high-mode .btn { bottom: 40px; }
      .card { transform: scale(0.9); }
    }

    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 9px; opacity: 0.5; letter-spacing: 1px;" id="songTitle">THE MOON AND THE SKY</div>
  </div>

  <audio id="audioPlayer" loop>
    <source src="https://files.catbox.moe/xg445g.mp3" type="audio/mpeg">
  </audio>

  <main class="card">
    <p style="font-size: 9px; opacity: 0.4; letter-spacing: 4px; margin-bottom: 5px;">BERO OFFICIAL</p>
    <h1 id="heroName" onclick="handleEgg()">BERO</h1>
    
    <div class="storm-scene">
      <img src="https://files.catbox.moe/vinhxn.webp" class="scene-img" alt="Bero Character">
      <div class="rain-overlay"></div>
    </div>
  </main>

  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    const player = document.getElementById('audioPlayer');
    const btn = document.getElementById('playBtn');
    let isHighMode = false;
    let taps = 0;
    let timer;

    function togglePlay() {
      if (player.paused) {
        player.play().catch(e => console.log("Music interaction required"));
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--accent)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
      }
    }

    document.body.addEventListener('click', function() {
        if (player.paused) { togglePlay(); }
    }, { once: true });

    function handleEgg() {
      taps++;
      clearTimeout(timer);
      
      if(taps === 5) {
        const body = document.getElementById('mainBody');
        const heroText = document.getElementById('heroName');
        
        if (!isHighMode) {
          body.classList.add('high-mode');
          heroText.innerText = "HIGH MODE";
          isHighMode = true;
        } else {
          body.classList.remove('high-mode');
          heroText.innerText = "BERO";
          isHighMode = false;
        }
        taps = 0;
      }
      
      timer = setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>

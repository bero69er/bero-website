<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <!-- Icon Library (Ensures the TikTok/Snap icons work) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* High-End Background Glows */
    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    /* Glass Card Design */
    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 380px;
      padding: 60px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .tag {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1rem;
      color: #aaa;
      line-height: 1.5;
    }

    /* SEPARATED SOCIAL BUTTONS */
    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px 28px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1rem;
      z-index: 20;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn:active { transform: scale(0.9); }

    /* TikTok Style (Left) */
    .tiktok-btn {
      left: 20px;
      background: #000;
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent);
    }

    /* Snapchat Style (Right) */
    .snap-btn {
      right: 20px;
      background: var(--snap);
      color: black;
      box-shadow: 0 10px 25px rgba(255, 252, 0, 0.2);
    }

    .btn i { font-size: 1.4rem; }

  </style>
</head>
<body>

  <div class="glow-top"></div>

  <main class="card">
    <p class="tag">Online Now</p>
    <h1>BERO</h1>
    <p class="subtitle">Creating digital experiences<br>directly from an iPhone.</p>
  </main>

  <!-- Left: TikTok -->
  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i>
    <span>TIKTOK</span>
  </a>

  <!-- Right: Snapchat -->
  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i>
    <span>SNAP</span>
  </a>

</body>
</html>

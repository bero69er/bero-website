<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 380px;
      padding: 30px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
      margin-bottom: 5px;
    }

    /* --- RAINY ANIME SCENE --- */
    .scene-box {
      margin: 15px auto 0;
      width: 100%;
      height: 160px;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      background: #0a0a0f;
      animation: lightning 8s infinite;
    }

    /* Animated Clouds */
    .clouds {
      position: absolute;
      width: 200%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
                  radial-gradient(circle at 70% 20%, rgba(255,255,255,0.05) 0%, transparent 40%);
      filter: blur(20px);
      animation: cloudMove 20s linear infinite;
    }

    /* Heavy Rain */
    .rain {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(170deg, 
        transparent 0%, 
        transparent 45%, 
        rgba(255, 255, 255, 0.1) 50%, 
        transparent 55%);
      background-size: 80px 80px;
      animation: rainFall 0.4s linear infinite;
      z-index: 2;
    }

    /* Anime Male Silhouette */
    .anime-male {
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 100px;
      background: #000;
      clip-path: polygon(45% 15%, 55% 15%, 65% 25%, 60% 40%, 50% 35%, 45% 45%, 20% 55%, 30% 95%, 70% 95%, 80% 55%, 55% 45%);
      z-index: 3;
      transition: background 0.1s;
    }

    /* Keyframes for Effects */
    @keyframes rainFall {
      from { transform: translateY(-80px); }
      to { transform: translateY(0); }
    }

    @keyframes cloudMove {
      from { transform: translateX(-50%); }
      to { transform: translateX(0); }
    }

    @keyframes lightning {
      0%, 90%, 100% { background: #0a0a0f; }
      92% { background: #2a2a3a; }
      93% { background: #151520; }
      94% { background: #4a4a6a; }
    }

    /* --- UI ELEMENTS --- */
    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      z-index: 20;
    }
    .tiktok-btn { left: 20px; background: #000; color: white; box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent); }
    .snap-btn { right: 20px; background: var(--snap); color: black; }

    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 45px; height: 45px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
    }

    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 10px; opacity: 0.5;" id="songTitle">CHILL JAZZ</div>
    <audio id="audioPlayer" loop></audio>
  </div>

  <main class="card">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 4px; margin-bottom: 10px;">BERO OFFICIAL</p>
    <h1 id="heroName" onclick="handleEgg()">BERO</h1>
    
    <div class="scene-box">
      <div class="clouds"></div>
      <div class="rain"></div>
      <div class="anime-male"></div>
    </div>
  </main>

  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    const jazzSongs = [
      { name: "CHILL LO-FI", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { name: "NIGHT JAZZ", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { name: "SMOOTH SAX", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" }
    ];
    const player = document.getElementById('audioPlayer');
    const song = jazzSongs[Math.floor(Math.random() * jazzSongs.length)];
    player.src = song.url;
    document.getElementById('songTitle').innerText = song.name;

    function togglePlay() {
      const btn = document.getElementById('playBtn');
      if (player.paused) {
        player.play();
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--accent)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
      }
    }

    let taps = 0;
    function handleEgg() {
      taps++;
      if(taps === 5) {
        document.getElementById('mainBody').classList.add('high-mode');
        document.getElementById('heroName').innerText = "HIGH MODE";
        taps = 0;
      }
      setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>

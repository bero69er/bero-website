<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 380px;
      padding: 30px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
      margin-bottom: 5px;
    }

    /* --- Storm Scene Box (Replacing Fight Box) --- */
    .storm-scene {
      margin: 15px auto 0;
      width: 100%;
      height: 160px; /* Adjusted height for the scene */
      border-radius: 25px;
      border: 2px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
      
      /* 1. The Cloudy/Dark Sky Background */
      background: linear-gradient(to bottom, #1a1a2e 0%, #0f0f1a 70%, #050509 100%);
      
      /* Lightning Flash Animation */
      animation: lightningFlash 8s linear infinite;
    }

    /* 2. The Rain Effect (Pure CSS) */
    .storm-scene::before {
      content: '';
      position: absolute;
      top: -50%; /* Start off-screen */
      left: 0;
      width: 100%;
      height: 200%; /* Extra height for animation */
      
      /* Repeating linear gradient creates 'drops' */
      background-image: repeating-linear-gradient(190deg, 
        rgba(255, 255, 255, 0.1) 0px, 
        rgba(255, 255, 255, 0.1) 1px, 
        transparent 1px, 
        transparent 15px
      );
      
      /* Faster rain animation */
      animation: rainFall 0.8s linear infinite;
      z-index: 2; /* Rain is in front of sky, behind figure */
    }

    /* 3. Anime Figure Silhouette (Drawn with clip-path) */
    .anime-figure {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 90px;
      
      /* Silhouette color (dark navy/black) */
      background: #080811;
      
      /* Draws the sitting pose looking up */
      clip-path: polygon(
        /* Head/Gaze up */
        45% 10%, 65% 15%, 70% 30%, 60% 35%, 50% 30%, 
        /* Neck */
        50% 38%,
        /* Shoulder/Torso */
        30% 40%, 15% 55%, 20% 75%, 35% 85%, 
        /* Arms holding knees */
        45% 88%, 65% 85%, 75% 75%, 80% 60%, 
        /* Legs tucked */
        75% 95%, 60% 100%, 40% 100%, 25% 95%
      );
      
      border-bottom: 2px solid rgba(255,255,255,0.05); /* Slight separation from box bottom */
      z-index: 5; /* Figure is in front */
      
      /* Fade in slightly on lightning flash */
      animation: figureGlow 8s linear infinite;
    }

    /* --- Animations --- */

    @keyframes rainFall {
      0% { transform: translateY(0); }
      100% { transform: translateY(15px); } /* repeating interval */
    }

    @keyframes lightningFlash {
      /* Background brightness animation */
      0%, 45%, 55%, 100% { background: linear-gradient(to bottom, #1a1a2e 0%, #0f0f1a 70%, #050509 100%); filter: brightness(1); }
      48% { background: #3d3d5c; filter: brightness(1.8) contrast(1.2); } /* Main flash */
      50% { background: #1a1a2e; filter: brightness(1); } /* Brief dip */
      52% { background: #2e2e4d; filter: brightness(1.5); } /* Aftershock */
    }

    @keyframes figureGlow {
      /* Figure slightly illuminates during lightning */
      0%, 45%, 55%, 100% { background: #080811; }
      48% { background: #1a1a2e; } /* Flash */
      52% { background: #10101a; } /* Aftershock */
    }


    /* --- Original UI elements preserved --- */
    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      z-index: 20;
    }
    .tiktok-btn { left: 20px; background: #000; color: white; box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent); }
    .snap-btn { right: 20px; background: var(--snap); color: black; }

    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 45px; height: 45px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
    }

    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 10px; opacity: 0.5;" id="songTitle">CHILL JAZZ</div>
    <audio id="audioPlayer" loop></audio>
  </div>

  <main class="card">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 4px; margin-bottom: 10px;">BERO OFFICIAL</p>
    <h1 id="heroName" onclick="handleEgg()">BERO</h1>
    
    <div class="storm-scene">
      <div class="anime-figure"></div>
    </div>
  </main>

  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    // --- Original Script Preserved ---
    const jazzSongs = [
      { name: "CHILL LO-FI", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { name: "NIGHT JAZZ", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { name: "SMOOTH SAX", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" }
    ];
    const player = document.getElementById('audioPlayer');
    const song = jazzSongs[Math.floor(Math.random() * jazzSongs.length)];
    player.src = song.url;
    document.getElementById('songTitle').innerText = song.name;

    function togglePlay() {
      const btn = document.getElementById('playBtn');
      if (player.paused) {
        player.play();
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--accent)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
      }
    }

    let taps = 0;
    function handleEgg() {
      taps++;
      if(taps === 5) {
        document.getElementById('mainBody').classList.add('high-mode');
        document.getElementById('heroName').innerText = "HIGH MODE";
        taps = 0;
      }
      setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BERO OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #00f2ea;
      --pink: #ff0050;
      --snap: #FFFC00;
      --bg: #050505;
      --fight-bg: #87CEEB; /* Sky Blue */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -10%;
      width: 100%;
      height: 40%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 380px;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 30%, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
      margin-bottom: 20px; /* Added spacing */
    }

    /* Fight Box Section */
    .fight-box {
      margin-top: 25px;
      width: 100%;
      height: 150px;
      background-color: var(--fight-bg);
      border-radius: 25px;
      border: 4px solid #fff; /* White border */
      position: relative;
      overflow: hidden; /* Keep snow and stickmen inside */
      box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
    }

    /* Snowing Animation */
    .snow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, #fff 2px, transparent 3px),
        radial-gradient(circle at 50% 10%, #fff 2px, transparent 3px),
        radial-gradient(circle at 80% 40%, #fff 2px, transparent 3px),
        radial-gradient(circle at 10% 60%, #fff 2px, transparent 3px),
        radial-gradient(circle at 40% 80%, #fff 2px, transparent 3px),
        radial-gradient(circle at 70% 90%, #fff 2px, transparent 3px),
        radial-gradient(circle at 90% 20%, #fff 2px, transparent 3px),
        radial-gradient(circle at 30% 50%, #fff 2px, transparent 3px),
        radial-gradient(circle at 60% 70%, #fff 2px, transparent 3px);
      background-size: 100px 100px;
      animation: snowFall 5s linear infinite;
    }

    @keyframes snowFall {
      0% { background-position: 0px 0px; }
      100% { background-position: 0px 100px; }
    }

    /* Stickman Container */
    .stickman-stage {
      position: absolute;
      bottom: 20px;
      width: 100%;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 30px;
    }

    /* Stickman Styling (SVG-based) */
    .stickman {
      width: 30px;
      height: 60px;
    }

    .stickman svg {
      width: 100%;
      height: 100%;
      stroke: #000; /* Stickman color */
      stroke-width: 2;
      fill: none;
    }

    /* Fight Animation - Stickman 1 */
    .stickman-1 {
      animation: attack1 2s ease-in-out infinite;
    }

    @keyframes attack1 {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      30% { transform: translateX(10px) rotate(-10deg); } /* Wind up */
      50% { transform: translateX(-15px) rotate(10deg); } /* Punch */
      70% { transform: translateX(0) rotate(0deg); } /* Return */
    }

    /* Fight Animation - Stickman 2 */
    .stickman-2 {
      animation: attack2 2s ease-in-out infinite;
      animation-delay: 0.5s; /* Staggered attack */
    }

    @keyframes attack2 {
      0%, 100% { transform: translateX(0) rotate(0deg) scaleX(-1); }
      30% { transform: translateX(-10px) rotate(10deg) scaleX(-1); } /* Wind up */
      50% { transform: translateX(15px) rotate(-10deg) scaleX(-1); } /* Punch */
      70% { transform: translateX(0) rotate(0deg) scaleX(-1); } /* Return */
    }

    /* Flipped version for stickman 2 */
    .stickman-2 svg {
      transform: scaleX(-1);
    }

    /* Buttons */
    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      z-index: 20;
    }
    .tiktok-btn { left: 20px; background: #000; color: white; box-shadow: -4px 0 0 var(--pink), 4px 0 0 var(--accent); }
    .snap-btn { right: 20px; background: var(--snap); color: black; }

    /* Music Control */
    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 45px; height: 45px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
    }

    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 10px; opacity: 0.5;" id="songTitle">CHILL JAZZ</div>
    <audio id="audioPlayer" loop></audio>
  </div>

  <main class="card">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 4px; margin-bottom: 10px;">BERO OFFICIAL</p>
    <h1 id="heroName" onclick="handleEgg()">BERO</h1>
    
    <div class="fight-box">
      <div class="snow"></div> <div class="stickman-stage">
        <div class="stickman stickman-1">
          <svg viewBox="0 0 30 60">
            <circle cx="15" cy="10" r="8"/>
            <line x1="15" y1="18" x2="15" y2="35"/>
            <line x1="15" y1="22" x2="5" y2="30"/>
            <line x1="15" y1="22" x2="25" y2="30"/>
            <line x1="15" y1="35" x2="8" y2="55"/>
            <line x1="15" y1="35" x2="22" y2="55"/>
          </svg>
        </div>
        <div class="stickman stickman-2">
          <svg viewBox="0 0 30 60">
            <circle cx="15" cy="10" r="8"/>
            <line x1="15" y1="18" x2="15" y2="35"/>
            <line x1="15" y1="22" x2="5" y2="30"/>
            <line x1="15" y1="22" x2="25" y2="30"/>
            <line x1="15" y1="35" x2="8" y2="55"/>
            <line x1="15" y1="35" x2="22" y2="55"/>
          </svg>
        </div>
      </div>
    </div>
  </main>

  <a href="https://www.tiktok.com/@a7la_bero69" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/bero69er" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    // 1. RANDOM JAZZ
    const jazzSongs = [
      { name: "CHILL LO-FI", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { name: "NIGHT JAZZ", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { name: "SMOOTH SAX", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" }
    ];
    const player = document.getElementById('audioPlayer');
    const song = jazzSongs[Math.floor(Math.random() * jazzSongs.length)];
    player.src = song.url;
    document.getElementById('songTitle').innerText = song.name;

    function togglePlay() {
      const btn = document.getElementById('playBtn');
      if (player.paused) {
        player.play();
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--accent)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
      }
    }

    // 2. HIGH MODE (5 Taps)
    let taps = 0;
    function handleEgg() {
      taps++;
      if(taps === 5) {
        document.getElementById('mainBody').classList.add('high-mode');
        document.getElementById('heroName').innerText = "HIGH MODE";
        taps = 0;
      }
      setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>
